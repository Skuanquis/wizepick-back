version: '3.8'

services:
  # ============================================
  # PostgreSQL Database (Development)
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: wizepick-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: wizepick_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wizepick-dev-network

  # ============================================
  # Redis (Development)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: wizepick-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - wizepick-dev-network

  # ============================================
  # pgAdmin (Development)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wizepick-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wizepick.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
    networks:
      - wizepick-dev-network
    depends_on:
      - postgres

networks:
  wizepick-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local
  pgadmin_dev_data:
    driver: local
